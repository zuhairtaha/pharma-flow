name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # يسمح بتشغيل يدوي من صفحة Actions
  workflow_dispatch:

# الصلاحيات المطلوبة لنشر GitHub Pages عبر artifact
permissions:
  contents: read
  pages: write
  id-token: write

# تشغيل واحد متزامن — لا نُلغي أي نشر قيد التنفيذ لتجنّب ترك الموقع بحالة نصف منشورة
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # يُمرَّر إلى vite.config.ts لضبط base path تلقائياً
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # يُفعِّل GitHub Pages تلقائياً عند أول تشغيل إن لم تكن مُفعَّلة،
          # ويضبط Source إلى GitHub Actions — فلا حاجة للمرور من Settings.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
